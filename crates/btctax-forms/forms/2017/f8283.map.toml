# Form 8283 (Rev. 12-2014) — the revision btctax files for TY2017 — logical cell →
# fully-qualified PDF field name. Every money column (Section A g/h; Section B c/f/h) is a
# dollars+cents PAIR (26 cent fields total). The Rev. 12-2014 form has NO "k Digital assets"
# property box, so BTC uses "j Other" (p1-cb4[8], on-state /9) + btc_property_note (prepended
# to the first Section B row's (a) description). Section A holds 5 rows (A-E); Section B Part I
# holds 4 rows (Line5A-5D). Section B's property table is on PAGE 2 (unlike the 2023/2025 rev.).
# We FILL donee/appraiser IDENTITY + per-row property data; the appraiser has no printed-NAME
# field on this revision (identity = the handwritten signature), so appraiser_name is omitted.
form = "f8283"
year = 2017

# ── Section A — Donated Property of $5,000 or Less (Part I, lines 1A-1E). (a) donee + (c) desc
#   live under Table1; (d)-(i) under Pt1Tabble2. cost(g)/fmv(h) are dollars+cents pairs.
[section_a]
rows = [
