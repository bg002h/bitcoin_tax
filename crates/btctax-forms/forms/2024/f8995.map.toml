# Form 8995 (Qualified Business Income Deduction, Simplified), TY2024 — logical line → PDF field name.
#
# Extracted with `cargo run -p xtask -- dump-fields crates/btctax-forms/forms/2024/f8995.pdf` and
# correlated against the printed form (`pdftotext -layout`). 33 text fields, no checkboxes.
#
# Column x-clusters (the code-side oracle lives in form8995.rs): MID x ≈ [410,482], AMOUNT x ≈ [504,576].
#
# ★ **The parenthesized boxes.** Lines 3, 7, 16 and 17 are printed INSIDE literal `(   )` on the form,
# and their widgets are inset ~4pt from the ordinary column: MID-paren [414.4,478.4] vs MID
# [410.4,481.6]; AMOUNT-paren [508.0,572.0] vs AMOUNT [504.0,576.0]. They need NO separate cluster
# here, because the geometric oracle bands the widget's x-CENTER, and the inset boxes share their
# column's center (446.4 ≈ 446.0; 540.0 = 540.0). What they DO need is a sign convention: **the
# parentheses supply the minus sign, so the value written must be a POSITIVE MAGNITUDE.** Writing
# `-1234` renders as `(-1,234)` — a positive number on a filed return. `qbi::Form8995Lines` stores
# every one of these as a magnitude ≥ 0 for exactly that reason.
#
# ★ PART I ROW 1i — the trade or business (Fable P7 r1 I1).
#   Line 2's own text is "Total qualified business income or (loss). Combine lines 1i through 1v,
#   column (c)". Before P7 the table was left blank because v1's only QBI was REIT dividends and line 2
#   was always ZERO — a total of nothing over nothing. P7 gave the crypto Schedule C a §199A deduction,
#   which made line 2 NON-ZERO while the column stayed empty: a filed form totalling a column that has
#   no rows, claiming a deduction for a business it never names. Row 1i now carries it.
#
#   The row is a horizontal triple at y≈[552,576], so its three cells share a y and CANNOT join the
#   ordinal-y descent group. Their check is the column band instead, and the bands are TIGHT for a
#   reason: row1_qbi's x-center is 529.2, which sits INSIDE the ordinary AMOUNT cluster [504,576]
#   (center 540). A loose band would accept a cell mis-mapped between the two. row1_qbi is additionally
#   pinned as descent ordinal 0, which asserts the row really does sit ABOVE line 2.
#
#   row1_tin has /MaxLen = 11 → the HYPHENATED SSN. A sole proprietor's TIN is their own SSN; btctax
#   has no EIN input.
row1_business = "topmostSubform[0].Page1[0].Table[0].Ln1A_Row1[0].f1_3[0]"  # (a) trade/business name
row1_tin      = "topmostSubform[0].Page1[0].Table[0].Ln1A_Row1[0].f1_4[0]"  # (b) TIN  (maxlen 11)
row1_qbi      = "topmostSubform[0].Page1[0].Table[0].Ln1A_Row1[0].f1_5[0]"  # (c) this business's QBI

# UNMAPPED ON PURPOSE:
#   line 1 rows ii-v (Ln1{B..E}_Row{2..5}) — v1 has exactly ONE trade or business (the crypto Schedule
#     C), so only row 1i can ever be filled. A second business would need a second Schedule C, which the
#     input model does not have.
#   line 3 (f1_19) — a prior-year trade/business QBI loss carryforward. No v1 input exists: a Schedule C
#     LOSS refuses upstream, so v1 never carries one forward.
form = "f8995"
year = 2024

# ── Part I — Trade, Business, or Aggregation Information (table blank in v1) ─────────────────────
line2  = "topmostSubform[0].Page1[0].ReadOrderSubForm[0].f1_18[0]"  # "Total qualified business income or (loss). Combine lines 1i through 1v, column (c)"
line4  = "topmostSubform[0].Page1[0].f1_20[0]"   # "Total qualified business income. Combine lines 2 and 3. If zero or less, enter -0-"
line5  = "topmostSubform[0].Page1[0].f1_21[0]"   # "Qualified business income component. Multiply line 4 by 20% (0.20)"

# ── Part I (cont.) — the REIT/PTP component (v1's only QBI) ──────────────────────────────────────
line6  = "topmostSubform[0].Page1[0].Line6_ReadOrder[0].f1_22[0]"   # "Qualified REIT dividends and publicly traded partnership (PTP) income or (loss)"
line7  = "topmostSubform[0].Page1[0].f1_23[0]"   # "…(loss) carryforward from the prior year"  ★ PAREN — positive magnitude
line8  = "topmostSubform[0].Page1[0].f1_24[0]"   # "Total qualified REIT dividends and PTP income. Combine lines 6 and 7. If zero or less, enter -0-"
line9  = "topmostSubform[0].Page1[0].f1_25[0]"   # "REIT and PTP component. Multiply line 8 by 20% (0.20)"
line10 = "topmostSubform[0].Page1[0].f1_26[0]"   # "Qualified business income deduction before the income limitation. Add lines 5 and 9"

# ── Part II — the taxable-income limitation ──────────────────────────────────────────────────────
line11 = "topmostSubform[0].Page1[0].f1_27[0]"   # "Taxable income before qualified business income deduction"
line12 = "topmostSubform[0].Page1[0].f1_28[0]"   # "Enter your net capital gain, if any, increased by any qualified dividends"
line13 = "topmostSubform[0].Page1[0].f1_29[0]"   # "Subtract line 12 from line 11. If zero or less, enter -0-"
line14 = "topmostSubform[0].Page1[0].f1_30[0]"   # "Income limitation. Multiply line 13 by 20% (0.20)"
line15 = "topmostSubform[0].Page1[0].f1_31[0]"   # "Qualified business income deduction. Enter the smaller of line 10 or line 14" → 1040 L13
line16 = "topmostSubform[0].Page1[0].f1_32[0]"   # "Total qualified business (loss) carryforward…"      ★ PAREN — positive magnitude
line17 = "topmostSubform[0].Page1[0].f1_33[0]"   # "Total qualified REIT dividends and PTP (loss) carryforward…"  ★ PAREN — positive magnitude

# ── Identity header (P6.2). Dumped + correlated against the printed form; the SSN cell declares
#    /MaxLen 11, so it takes the HYPHENATED form (the 1040's own SSN cells are /MaxLen 9 and take
#    bare digits — the forms genuinely differ, so `push_identity` reads each cell's capacity).
[identity]
name = "topmostSubform[0].Page1[0].f1_1[0]"
ssn  = "topmostSubform[0].Page1[0].f1_2[0]"
