# Form 8960 (Net Investment Income Tax, §1411), tax year 2024 — logical line → PDF field name.
#
# Extracted with `cargo run -p xtask -- dump-fields crates/btctax-forms/forms/2024/f8960.pdf` and
# correlated against the printed form (`pdftotext -layout`). The blank carries 35 text fields
# (f1_1 = name, f1_2 = SSN/EIN, then f1_3..f1_35 in unbroken reading order) + 3 checkboxes.
#
# NOTE the suffix offset is NOT a simple `line + k`: it holds only for lines 1–3, then the lettered
# sub-lines (4a–4c, 5a–5d, 9a–9d) make the printed number and the suffix diverge permanently. Every
# entry below was pinned against its printed label, never extrapolated.
#
# Column x-clusters (the code-side oracle lives in form8960.rs): MID x ≈ [410,482], AMOUNT x ≈ [504,576]
# — the same two as Schedule SE / Form 8959.
#
# UNMAPPED ON PURPOSE — left BLANK on the filed form because v1 does not model them, and a map entry
# would invite a future filler to write a misleading 0:
#   line 3   (f1_5)          annuities
#   lines 4a-4c (f1_6..f1_8) Schedule E (rental/royalty/K-1) — UNREPRESENTABLE in v1
#   line 6   (f1_13)         CFC/PFIC adjustments — MAGI is fail-closed to AGI
#   lines 9a-9c (f1_16..f1_18) + line 10 (f1_20) — investment expenses / additional modifications
#   lines 18a-21 (f1_28..f1_35) Part III ESTATES AND TRUSTS — must stay blank on an individual return
#   the 3 Part I election checkboxes (§6013(g), §6013(h), §1.1411-10(g)) — v1 makes no election
#
# The DERIVED totals 9d and 11 ARE filled, at zero: the form's own arithmetic adds them (line 12 =
# line 8 − line 11), so a reader re-adding the column must find them.
form = "f8960"
year = 2024

# ── Part I — Investment Income ──────────────────────────────────────────────────────────────────
line1  = "topmostSubform[0].Page1[0].f1_3[0]"    # "Taxable interest (see instructions)"
line2  = "topmostSubform[0].Page1[0].f1_4[0]"    # "Ordinary dividends (see instructions)"
line5a = "topmostSubform[0].Page1[0].f1_9[0]"    # "Net gain or loss from disposition of property"
line5d = "topmostSubform[0].Page1[0].f1_12[0]"   # "Combine lines 5a through 5c"
line7  = "topmostSubform[0].Page1[0].f1_14[0]"   # "Other modifications to investment income"
line8  = "topmostSubform[0].Page1[0].f1_15[0]"   # "Total investment income. Combine lines 1, 2, 3, 4c, 5d, 6, and 7"

# ── Part II — Investment Expenses Allocable to Investment Income and Modifications ──────────────
line9d = "topmostSubform[0].Page1[0].f1_19[0]"   # "Add lines 9a, 9b, and 9c"
line11 = "topmostSubform[0].Page1[0].f1_21[0]"   # "Total deductions and modifications. Add lines 9d and 10"

# ── Part III — Tax Computation (INDIVIDUALS; the estates/trusts branch stays blank) ─────────────
line12 = "topmostSubform[0].Page1[0].f1_22[0]"   # "Net investment income. Subtract Part II, line 11, from Part I, line 8"
line13 = "topmostSubform[0].Page1[0].f1_23[0]"   # "Modified adjusted gross income"
line14 = "topmostSubform[0].Page1[0].f1_24[0]"   # "Threshold based on filing status" — FILLABLE, not pre-printed
line15 = "topmostSubform[0].Page1[0].f1_25[0]"   # "Subtract line 14 from line 13. If zero or less, enter -0-"
line16 = "topmostSubform[0].Page1[0].f1_26[0]"   # "Enter the smaller of line 12 or line 15"
line17 = "topmostSubform[0].Page1[0].f1_27[0]"   # "Multiply line 16 by 3.8% (0.038)" → Schedule 2 line 12

# ── Identity header (P6.2). Dumped + correlated against the printed form; the SSN cell declares
#    /MaxLen 11, so it takes the HYPHENATED form (the 1040's own SSN cells are /MaxLen 9 and take
#    bare digits — the forms genuinely differ, so `push_identity` reads each cell's capacity).
[identity]
name = "topmostSubform[0].Page1[0].f1_1[0]"
ssn  = "topmostSubform[0].Page1[0].f1_2[0]"
