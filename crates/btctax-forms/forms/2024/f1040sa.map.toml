# Schedule A (Itemized Deductions), Form 1040, TY2024 — logical line → PDF field name.
#
# Extracted with `xtask dump-fields` + correlated line-by-line against the printed form
# (`pdftotext -layout`). Root subform is `topmostSubform[0]`.
#
# ★ THREE x-clusters, not two — Schedule A is the only form in this crate that needs a third:
#     AGI-INLINE  x ≈ [331, 403]   line 2 ONLY (`f1_4`)
#     MID         x ≈ [417, 489]   lines 1, 3, 5a-5e, 8a-8e, 11, 12, 13
#     AMOUNT      x ≈ [504, 576]   lines 4, 7, 10, 14, 17
#   Line 2 ("Enter amount from Form 1040 or 1040-SR, line 11") is NOT in the MID column: its box is
#   inline with the printed sentence, 86pt to the LEFT of MID, and it is the same WIDTH as MID — so a
#   width-based check would not catch a mis-map either. It gets its own cluster (verified on the
#   render: the box sits immediately after "…line 11").
#
# ★ NON-SEQUENTIAL SUFFIX — the only one on this form: **line 8b is `f1_19`, NOT `f1_17`.**
#   Reading down from line 8a (`f1_16`, y=408): the next MID-column box is `f1_19` (y=360) = line 8b,
#   and `f1_17`/`f1_18` (y=348, 336) are the two FREE-TEXT continuation rows BELOW it (the payee's
#   name/address for mortgage interest not reported on a 1098). The IRS numbered the text fields before
#   the amount. v1 fills neither, but the trap is recorded — anything that walks suffixes trips on it.
#
# ★ LINE 8d (`f1_21`) IS A ReadOnly "Reserved for future use" WIDGET. It is live, grey-shaded, and it
#   CONSUMES a suffix number (f1_20 = 8c, f1_21 = 8d reserved, f1_22 = 8e). Never write to it.
#
# UNMAPPED ON PURPOSE — left BLANK, never a misleading 0:
#   line 6  (f1_14 + desc f1_12/f1_13)  other taxes — no v1 input
#   line 8b (f1_19), 8c (f1_20)          mortgage interest not on a 1098; points
#   line 9  (f1_23)                      investment interest (Form 4952)
#   line 15 (f1_29)                      casualty and theft losses (Form 4684)
#   line 16 (f1_33 + desc f1_30..f1_32)  other itemized deductions
#   line 5a sales-tax checkbox (c1_1), line 8 checkbox (c1_2), line 18 checkbox (c1_3)
form = "f1040sa"
year = 2024

# ── The two ELECTION checkboxes (P6.3a Q7): elections core already honours in the ARITHMETIC that
#    the filed form never showed. c1_1 is the top-most button (y=566) = line 5a's "check this box";
#    the line-18 button names itself (Line18_ReadOrder).
check_5a_sales_tax      = { field = "topmostSubform[0].Page1[0].c1_1[0]", on = "1" }
check_18_elects_smaller = { field = "topmostSubform[0].Page1[0].Line18_ReadOrder[0].c1_3[0]", on = "1" }

# ── Medical and Dental Expenses ─────────────────────────────────────────────────────────────────
line1  = "topmostSubform[0].Page1[0].f1_3[0]"    # "Medical and dental expenses"                      MID
line2  = "topmostSubform[0].Page1[0].f1_4[0]"    # "Enter amount from Form 1040…, line 11"   ★ AGI-INLINE
line3  = "topmostSubform[0].Page1[0].f1_5[0]"    # "Multiply line 2 by 7.5% (0.075)"  ← §213(a) floor  MID
line4  = "topmostSubform[0].Page1[0].f1_6[0]"    # "Subtract line 3 from line 1…"                  AMOUNT

# ── Taxes You Paid ──────────────────────────────────────────────────────────────────────────────
line5a = "topmostSubform[0].Page1[0].f1_7[0]"    # "State and local income taxes or general sales taxes"  MID
line5b = "topmostSubform[0].Page1[0].f1_8[0]"    # "State and local real estate taxes"                    MID
line5c = "topmostSubform[0].Page1[0].f1_9[0]"    # "State and local personal property taxes"              MID
line5d = "topmostSubform[0].Page1[0].f1_10[0]"   # "Add lines 5a through 5c"                              MID
line5e = "topmostSubform[0].Page1[0].f1_11[0]"   # "Enter the smaller of line 5d or $10,000 ($5,000 MFS)" MID  ← §164(b) cap
line7  = "topmostSubform[0].Page1[0].f1_15[0]"   # "Add lines 5e and 6"                                AMOUNT

# ── Interest You Paid ───────────────────────────────────────────────────────────────────────────
line8a = "topmostSubform[0].Page1[0].f1_16[0]"   # "Home mortgage interest and points reported to you on Form 1098"  MID
line8e = "topmostSubform[0].Page1[0].f1_22[0]"   # "Add lines 8a through 8c"                              MID
line10 = "topmostSubform[0].Page1[0].f1_24[0]"   # "Add lines 8e and 9"                                AMOUNT

# ── Gifts to Charity ────────────────────────────────────────────────────────────────────────────
line11 = "topmostSubform[0].Page1[0].f1_25[0]"   # "Gifts by cash or check"                               MID
line12 = "topmostSubform[0].Page1[0].f1_26[0]"   # "Other than by cash or check… attach Form 8283 if over $500"  MID
line13 = "topmostSubform[0].Page1[0].f1_27[0]"   # "Carryover from prior year"                            MID
line14 = "topmostSubform[0].Page1[0].f1_28[0]"   # "Add lines 11 through 13"                           AMOUNT

# ── Total Itemized Deductions ───────────────────────────────────────────────────────────────────
line17 = "topmostSubform[0].Page1[0].f1_34[0]"   # "Add the amounts in the far right column for lines 4 through 16" → 1040 L12

# ── Identity header (P6.2). Dumped + correlated against the printed form; the SSN cell declares
#    /MaxLen 11, so it takes the HYPHENATED form (the 1040's own SSN cells are /MaxLen 9 and take
#    bare digits — the forms genuinely differ, so `push_identity` reads each cell's capacity).
[identity]
name = "topmostSubform[0].Page1[0].f1_1[0]"
ssn  = "topmostSubform[0].Page1[0].f1_2[0]"
