name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Runs on all three target OSes (NFR8). The macOS + Windows legs are what actually
  # EXERCISE the store's cfg-gated OS primitives (fs2 file locks, mlock/VirtualLock,
  # atomic rename, owner-only perms) — compile-checked on Linux, executed here.
  test:
    name: test
    strategy:
      fail-fast: false          # see all three OS results, not just the first failure
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo test --workspace --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: msrv-1.88
      - run: cargo check --workspace --locked

  # #41 Part C: the tax binaries must link NO HTTP client — network code lives ONLY in
  # btctax-update-prices. Asserts ureq/rustls are absent from the tax crates' cargo tree.
  net-isolation:
    name: net-isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo run -p xtask -- check-isolation

  pii-scan:
    name: pii-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: PII generic-shape scan
        run: bash scripts/pii-scan-generic.sh

  # The CLI worked-examples doc (SPEC §9). ADVISORY for now — not yet a required check (promotion is a
  # GitHub-settings action, §14). Ubuntu-only: the byte-exact golden is `#[cfg(unix)]` (I4 — journey stdout
  # embeds joined paths whose separator differs on Windows). The generator is HERMETIC (it pins
  # HOME/TZ/BTCTAX_PRICE_CACHE/BTCTAX_NOW per captured command — proven by
  # `examples_generate_is_hermetic_across_ambient_env`), so this job needs no ambient env pinning.
  examples:
    name: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Install groff (the -T pdf render device)
        run: sudo apt-get update && sudo apt-get install -y groff
      - name: Regenerate the golden and assert it is committed (drift gate)
        # cargo build progress goes to stderr, so the redirect captures ONLY the generator's stdout.
        run: |
          cargo run --locked -p xtask -- examples > docs/examples/examples.md
          git diff --exit-code -- docs/examples/examples.md \
            || { echo "::error::docs/examples/examples.md is STALE — run 'cargo run -p xtask -- examples > docs/examples/examples.md'"; exit 1; }
      - name: Forms-coverage census (HARD — every census form emits and is demonstrated in J6)
        run: cargo test -p btctax-forms --test census --locked
      - name: Subcommand-coverage report (SOFT — advisory, never fails the job)
        run: cargo run --locked -p xtask -- subcommand-coverage
      - name: Prove the examples PDF builds
        run: make examples
      - name: Prove the TUI screens PDF builds
        # The style-aware TUI goldens (docs/examples-tui/*.txt) are staleness-gated in the `test` job by the
        # crates' `*_goldens_match_committed` tests (they regenerate + compare in-process), so no git-diff
        # widening is needed here (P2 review N-2); this step only proves the separate TUI PDF renders.
        run: make examples-tui
