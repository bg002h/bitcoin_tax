# cargo-deny policy — supply-chain hygiene, run by the CI `supply-chain` job.
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# NOTE: this policy was authored where cargo-deny + network were unavailable, so it has NOT been run
# against the live dependency tree yet. Its first real evaluation is the GitHub `supply-chain` job; that
# run may surface advisories or licenses to address (that is the gate working). Tighten `bans` to `deny`
# and add justified `advisories.ignore` entries once the first run's findings are known.

[advisories]
version = 2
# RustSec advisory DB (fetched at CI runtime). v2 denies known vulnerabilities + yanked crates by default.
# Add `ignore = ["RUSTSEC-YYYY-NNNN"]` here — WITH a justification comment — for any unavoidable,
# non-exploitable advisory. None yet.
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for this MIT-OR-Unlicense project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Informational on the first pass (a fresh gate should not red-line CI on pre-existing dup versions that
# are not unilaterally fixable). Revisit → "deny" after the first clean run.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Crates must come from crates.io — no unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"
